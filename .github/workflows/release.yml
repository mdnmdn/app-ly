name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles nsis"
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "app-ly ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: zip windows installer
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe | Select-Object -First 1
          Compress-Archive -Path $exe.FullName -DestinationPath "$($exe.BaseName).zip"
          echo "EXE_NAME=$($exe.Name)" >> $env:GITHUB_ENV
          echo "ZIP_NAME=$($exe.BaseName).zip" >> $env:GITHUB_ENV

      - name: swap exe asset for zip
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" "$ZIP_NAME" --clobber --repo ${{ github.repository }}
          gh release delete-asset "${{ github.ref_name }}" "$EXE_NAME" --yes --repo ${{ github.repository }}
