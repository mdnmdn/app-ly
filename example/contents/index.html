<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shell Example</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }

      body {
        margin: 2rem auto;
        max-width: 40rem;
        line-height: 1.5;
      }

      button {
        margin-right: 0.5rem;
        margin-bottom: 0.5rem;
      }

      pre {
        padding: 1rem;
        border-radius: 0.5rem;
        background: rgba(127, 127, 127, 0.15);
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <h1>app-ly shell</h1>
    <p>This page is loaded from the configured <code>contents</code> path.</p>

    <div>
      <button id="save">Save note</button>
      <button id="load">Load note</button>
      <button id="notify">Notify</button>
      <button id="fetch">Fetch JSON</button>
      <button id="open-window">Open external window</button>
      <button id="close-window">Close external window</button>
      <button id="window-body">Get window body</button>
      <button id="window-eval">Eval in window</button>
    </div>

    <pre id="output">Ready.</pre>

    <script>
      const output = document.getElementById("output");

      function show(value) {
        output.textContent =
          typeof value === "string" ? value : JSON.stringify(value, null, 2);
      }

      document.getElementById("save").addEventListener("click", async () => {
        await shell.saveFile("note.txt", `Saved at ${new Date().toISOString()}`);
        await shell.log("saved note.txt");
        show("Saved note.txt");
      });

      document.getElementById("load").addEventListener("click", async () => {
        try {
          const text = await shell.readFile("note.txt");
          show(text);
        } catch (error) {
          show(String(error));
        }
      });

      document.getElementById("notify").addEventListener("click", async () => {
        await shell.notify("Shell Example", "Notification from contents HTML");
        show("Notification sent.");
      });

      document.getElementById("fetch").addEventListener("click", async () => {
        const response = await shell.get(
          "https://jsonplaceholder.typicode.com/todos/1",
        );
        show(response);
      });

      // Child windows are for flows this window can't run itself, e.g. an
      // external OAuth/login page you need to observe and drive from JS.
      let externalWindowId = null;
      let unlistenNav = null;
      let unlistenClosed = null;

      document.getElementById("open-window").addEventListener("click", async () => {
        const { id } = await shell.openWindow("https://example.com", {
          title: "External window example",
          width: 480,
          height: 640,
        });
        externalWindowId = id;
        show(`Opened external window: ${id}`);

        unlistenNav = await shell.onWindowNavigated((windowId, url) => {
          if (windowId !== externalWindowId) return;
          show(`External window navigated to: ${url}`);
        });

        unlistenClosed = await shell.onWindowClosed((windowId) => {
          if (windowId !== externalWindowId) return;
          show("External window closed");
          externalWindowId = null;
          if (unlistenNav) unlistenNav();
          if (unlistenClosed) unlistenClosed();
        });
      });

      document.getElementById("close-window").addEventListener("click", async () => {
        if (!externalWindowId) {
          show("No external window open");
          return;
        }
        await shell.closeWindow(externalWindowId);
      });

      document.getElementById("window-body").addEventListener("click", async () => {
        if (!externalWindowId) {
          show("No external window open");
          return;
        }
        const text = await shell.getWindowBody(externalWindowId);
        show(text);
      });

      document.getElementById("window-eval").addEventListener("click", async () => {
        if (!externalWindowId) {
          show("No external window open");
          return;
        }
        const title = await shell.evalWindow(externalWindowId, "return document.title;");
        show(`External window title: ${title}`);
      });
    </script>
  </body>
</html>
